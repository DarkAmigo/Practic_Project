{% extends "base.html" %}

{% block title %}Departments{% endblock %}

{% block content %}
<h1>Departments ({{ departments|length }})</h1>
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Chairperson</th>
        </tr>
    </thead>
    <tbody>
    {% for dept in departments %}
        <tr>
            <td>
                <a href="{% url 'academics:department_detail' pk=dept.pk %}">
                    {{ dept.name }}
                </a>
            </td>
            <td>{{ dept.chairperson|default:"—" }}</td>
        </tr>
    {% empty %}
        <tr><td colspan="2">No departments yet.</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
